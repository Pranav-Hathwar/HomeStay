<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mungaru Homestays — a private Malnad cottage in Mudigere, ideal for monsoon escapes and coffee-country stays." />
    <meta name="theme-color" content="#0a0f0c" />
    <title>Mungaru Homestays — Private Malnad Cottage in Mudigere</title>

    <!-- Canonical -->
    <link rel="canonical" href="https://home-stay-two.vercel.app/" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph (WhatsApp / Facebook link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Mungaru Homestays" />
    <meta property="og:title" content="Mungaru Homestays — Private Malnad Cottage in Mudigere" />
    <meta property="og:description" content="A whole Malnad cottage at 906 m above the coffee country — green views, hot-water baths, full kitchen. Sleeps 8–10." />
    <meta property="og:url" content="https://home-stay-two.vercel.app/" />
    <meta property="og:image" content="https://home-stay-two.vercel.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mungaru Homestays — Private Malnad Cottage in Mudigere" />
    <meta name="twitter:description" content="A whole Malnad cottage at 906 m above the coffee country. Sleeps 8–10." />
    <meta name="twitter:image" content="https://home-stay-two.vercel.app/og-image.jpg" />

    <!-- Structured data: LodgingBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LodgingBusiness",
      "name": "Mungaru Homestays",
      "description": "A private Malnad cottage in Gowdahalli Horati, Mudigere — booked as a whole home for 8–10 guests.",
      "url": "https://home-stay-two.vercel.app/",
      "image": "https://home-stay-two.vercel.app/og-image.jpg",
      "telephone": "+91-9180XXXXXXXX",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Gowdahalli Horati",
        "addressLocality": "Mudigere",
        "addressRegion": "Karnataka",
        "postalCode": "577132",
        "addressCountry": "IN"
      },
      "geo": { "@type": "GeoCoordinates", "latitude": 13.04369, "longitude": 75.61125 },
      "amenityFeature": [
        { "@type": "LocationFeatureSpecification", "name": "Free WiFi", "value": true },
        { "@type": "LocationFeatureSpecification", "name": "Free parking", "value": true },
        { "@type": "LocationFeatureSpecification", "name": "Hot water", "value": true },
        { "@type": "LocationFeatureSpecification", "name": "Kitchen", "value": true },
        { "@type": "LocationFeatureSpecification", "name": "Power backup", "value": true }
      ],
      "petsAllowed": true,
      "numberOfRooms": 3,
      "aggregateRating": { "@type": "AggregateRating", "ratingValue": "5.0", "reviewCount": "6" }
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts off the render-blocking path; display=swap shows fallback text immediately. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Inter:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    </noscript>
  </head>
  <body class="bg-ink text-fog">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
