# CI gate — typecheck + production build on every push/PR to main.
# Deployment (CD) is handled by Vercel's Git integration, which builds and
# ships the same commit automatically once the repo is linked in Vercel.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + build
        run: npm run build

      - name: Bundle size budget
        run: npm run size
